version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adonis_auth_app
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=info
      # В Adonis 6 обязательно нужен APP_KEY для сессий/хэширования
      - APP_KEY=${APP_KEY}
      # Настройки БД
      - DB_HOST=db # Указываем имя контейнера БД
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-your_secure_password}
      - DB_DATABASE=${DB_DATABASE:-auth_api}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: adonis_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password}
      POSTGRES_DB: ${DB_DATABASE:-auth_api}
    ports:
      # Пробрасываем порт наружу, чтобы можно было подключиться через DBeaver/DataGrip
      - "5432:5432"
    volumes:
      # Сохраняем данные БД на хост-машине, чтобы они не удалились при рестарте
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-auth_api}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
